<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilo.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0d2b3e;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Desenvolvimento Web I</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre a Disciplina</a></li>
          <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos Estudados</a></li>
          <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="cabecalho text-center">
    <div class="container">
      <h1>Contato</h1>
      <p class="lead mb-0">Deixe sua mensagem</p>
    </div>
  </header>

  <main class="container">
    <div class="row">
      <div class="col-lg-6 mx-auto">

        <p>
          Preencha o formulário abaixo com seu nome e sua mensagem. Os campos são validados
          com JavaScript antes do envio.
        </p>

        <form onsubmit="return validarFormulario()">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
          </div>
          <div class="mb-3">
            <label for="mensagem" class="form-label">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="4"
                      placeholder="Digite sua mensagem"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Enviar</button>
          <button type="button" class="btn btn-secondary ms-2" onclick="limparFormulario()">Limpar</button>

          <div id="aviso" class="mensagem"></div>
        </form>

      </div>
    </div>
  </main>

  <footer class="rodape text-center">
    <div class="container">
      <p class="mb-0">Projeto Final &bull; Curso de Análise e Desenvolvimento de Sistemas</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
